<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>海外用1688 · 教程版口播</title>
<style>
  :root{
    --ink:#16181d; --ink-2:#3c4048; --ink-3:#6b7078; --ink-4:#9aa0a8;
    --line:#e7e8ea; --line-2:#f0f1f2; --bg:#ffffff; --bg-2:#fafafa;
    --accent:#3a6ea5; --maxw:760px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    font-size:16px; line-height:1.62; -webkit-font-smoothing:antialiased;}
  body.locked{overflow:hidden}
  a{color:inherit}
  .wrap{display:grid; grid-template-columns:248px 1fr; max-width:1180px; margin:0 auto;}
  nav.toc{position:sticky; top:0; align-self:start; height:100vh; overflow-y:auto; padding:46px 24px 46px 34px; border-right:1px solid var(--line);}
  .brand{font-size:13px; color:var(--ink-3); margin-bottom:4px;} .brand b{color:var(--ink); font-weight:600;}
  .toc-sub{font-size:12px; color:var(--ink-4); margin-bottom:26px; line-height:1.5;}
  nav.toc ol{list-style:none; margin:0; padding:0; counter-reset:s;}
  nav.toc a.navlink{display:flex; gap:11px; align-items:baseline; padding:6.5px 0; counter-increment:s; font-size:13.5px; color:var(--ink-3); text-decoration:none; line-height:1.4;}
  nav.toc a.navlink::before{content:counter(s,decimal-leading-zero); font-variant-numeric:tabular-nums; font-size:11px; color:var(--ink-4); min-width:18px;}
  nav.toc a.navlink:hover{color:var(--ink);}
  nav.toc a.navlink.active{color:var(--ink); font-weight:600;}
  nav.toc a.navlink.active::before{color:var(--accent);}
  .toc-foot{margin-top:28px; padding-top:18px; border-top:1px solid var(--line); font-size:11.5px; color:var(--ink-4); line-height:1.55;}
  main{padding:60px 56px 130px; min-width:0;}
  .eyebrow{font-size:12px; letter-spacing:.07em; color:var(--ink-4); margin:0 0 13px;}
  h1{font-size:32px; line-height:1.2; letter-spacing:-.018em; margin:0 0 16px; font-weight:660; max-width:var(--maxw);}
  .lede{font-size:17.5px; line-height:1.56; color:var(--ink-2); margin:0 0 18px; max-width:var(--maxw);}
  .meta-row{display:flex; flex-wrap:wrap; gap:8px 22px; font-size:12.5px; color:var(--ink-3); border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:14px 0; margin:24px 0 0; max-width:var(--maxw);}
  .meta-row b{color:var(--ink); font-weight:600;}
  section.panel{padding:56px 0 0; scroll-margin-top:26px; max-width:var(--maxw);}
  section.panel .num{font-size:12px; color:var(--ink-4); font-variant-numeric:tabular-nums; letter-spacing:.04em;}
  h2{font-size:24px; line-height:1.25; letter-spacing:-.014em; margin:7px 0 6px; font-weight:640;}
  .sectsub{color:var(--ink-3); font-size:15px; margin:0 0 24px; max-width:640px;}
  h3{font-size:16.5px; margin:28px 0 8px; font-weight:640; letter-spacing:-.005em;}
  p{margin:0 0 15px; color:var(--ink-2);}
  p strong,li strong{color:var(--ink); font-weight:620;}
  ul.clean{margin:0 0 16px; padding:0; list-style:none;}
  ul.clean li{position:relative; padding:0 0 11px 18px; color:var(--ink-2); font-size:15px;}
  ul.clean li::before{content:""; position:absolute; left:2px; top:11px; width:4px; height:4px; border-radius:50%; background:var(--ink-4);}
  ul.src li{font-size:13.5px; color:var(--ink-3);}
  hr{border:0; border-top:1px solid var(--line); margin:32px 0;}
  .pull{border-left:2px solid var(--ink); padding:2px 0 2px 20px; margin:14px 0 6px; font-size:16.5px; line-height:1.5; color:var(--ink); max-width:640px;}
  .note{font-size:13.5px; color:var(--ink-3); background:var(--bg-2); border:1px solid var(--line); border-radius:9px; padding:15px 18px; margin:20px 0;}
  .note b{color:var(--ink);}
  /* script block */
  .script{border:1px solid var(--line); border-radius:12px; padding:26px 28px; margin:16px 0 4px; background:#fff; font-size:16px; line-height:1.72;}
  .script p{margin:0 0 15px; color:var(--ink);} .script p:last-child{margin-bottom:0;}
  .script .stp{font-weight:660; color:var(--ink);}
  .copybtn{font-size:12.5px; color:var(--ink-2); background:#fff; border:1px solid var(--line); border-radius:99px; padding:6px 15px; cursor:pointer; margin:0 0 4px;}
  .copybtn:hover{border-color:var(--ink-4);} .copybtn.done{color:var(--accent); border-color:var(--accent);}
  /* social quote */
  .q{border-left:2px solid var(--line); padding:2px 0 2px 18px; margin:14px 0;}
  .qt{font-size:15px; color:var(--ink); line-height:1.55;}
  .qm{font-size:12.5px; color:var(--ink-4); margin-top:6px; line-height:1.5;}
  .tie{font-size:15px; color:var(--ink-2); border-top:1px solid var(--line-2); padding-top:14px; margin-top:16px;}
  .foot{margin-top:40px; padding-top:20px; border-top:1px solid var(--line); font-size:12.5px; color:var(--ink-4);}
  /* gate */
  #gate{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:24px;}
  .gatecard{width:100%; max-width:340px; text-align:center;}
  .gatecard .gt{font-size:15px; font-weight:640; color:var(--ink); margin-bottom:4px;}
  .gatecard .gs{font-size:13px; color:var(--ink-4); margin-bottom:22px;}
  .gatecard input{width:100%; font-size:15px; padding:11px 14px; border:1px solid var(--line); border-radius:10px; outline:none; text-align:center;}
  .gatecard input:focus{border-color:var(--ink-3);}
  .gatecard button{width:100%; margin-top:10px; font-size:14px; padding:11px; border:0; border-radius:10px; background:var(--ink); color:#fff; cursor:pointer;}
  .gatecard .err{font-size:12.5px; color:#b4433a; margin-top:10px; min-height:16px;}
  @media (max-width:880px){
    .wrap{grid-template-columns:1fr;}
    nav.toc{position:static; height:auto; border-right:0; border-bottom:1px solid var(--line); padding:28px 22px;}
    nav.toc ol{columns:2; column-gap:18px;}
    main{padding:36px 22px 90px;}
    h1{font-size:26px;} .script{padding:20px 20px;}
  }
</style>
</head>
<body class="locked">
<div id="gate">
  <form class="gatecard" onsubmit="return gateSubmit(event)">
    <div class="gt">海外用1688 · 教程版口播</div>
    <div class="gs">输入访问密码</div>
    <input id="gate-input" type="password" autocomplete="current-password" autofocus>
    <button type="submit">进入</button>
    <div class="err" id="gate-err"></div>
  </form>
</div>
<div id="content" hidden></div>

function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){const c=document.getElementById('content');c.innerHTML=html;c.hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');initScrollspy();}
function initScrollspy(){
  const links=[...document.querySelectorAll('nav.toc a')];
  const map=new Map(links.map(a=>[a.getAttribute('href').slice(1),a]));
  const obs=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.remove('active'));const a=map.get(e.target.id);if(a)a.classList.add('active');}});},{rootMargin:'-16% 0px -74% 0px',threshold:0});
  document.querySelectorAll('section.panel').forEach(s=>obs.observe(s));
}
document.addEventListener('click',function(e){
  const b=e.target.closest('[data-copy]'); if(!b) return;
  const el=document.querySelector(b.getAttribute('data-copy')); if(!el) return;
  const txt=[...el.querySelectorAll('p')].map(p=>p.innerText).join('\n\n');
  navigator.clipboard.writeText(txt).then(()=>{const o=b.textContent;b.textContent='已复制';b.classList.add('done');setTimeout(()=>{b.textContent=o;b.classList.remove('done');},1600);});
});
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const html=await decryptPayload(inp.value);reveal(html);try{localStorage.setItem(LSKEY,inp.value);}catch(_){}}catch(ex){err.textContent='密码不对';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem(LSKEY);if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem(LSKEY);}catch(_){}}})();
</script>
